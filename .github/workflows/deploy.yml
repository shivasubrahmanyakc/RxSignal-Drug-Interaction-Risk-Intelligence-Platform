name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ -d "/var/www/FAERS" ]; then cd /var/www/FAERS; elif [ -d "$HOME/FAERS" ]; then cd "$HOME/FAERS"; elif [ -d "/home/ubuntu/FAERS" ]; then cd /home/ubuntu/FAERS; else cd $(pwd); fi
            git fetch --all
            git reset --hard origin/main
            if [ -d "frontend" ]; then
              cd frontend
              npm install
              npm run build
              sudo rm -rf /var/www/html/*
              if [ -d "dist" ]; then
                sudo cp -r dist/* /var/www/html/
              elif [ -d "build" ]; then
                sudo cp -r build/* /var/www/html/
              fi
            fi
            sudo systemctl restart nginx || sudo service nginx restart || true
